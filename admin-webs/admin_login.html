<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Health Matters – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Adlam+Display&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--primary:#156082;--primary-dark:#0e4560;--white:#ffffff;--bg:#f0f4f8;--text:#1a1a2e;--muted:#5a6a7a;--err:#c0392b;}
    html{font-size:16px;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Nunito',sans-serif;font-weight:300;background:linear-gradient(160deg,#e8f4fb 0%,#f0f4f8 60%,#ddeaf5 100%);display:flex;flex-direction:column;min-height:100vh;background-image:url('images/nhs.jpg');background-size:cover;background-position:center;background-attachment:fixed;}
    body::before{content:'';position:fixed;inset:0;background:rgba(255,255,255,0.65);pointer-events:none;z-index:0;}
    .topbar,.login-wrapper{position:relative;z-index:1;}
    .topbar{background:var(--primary);padding:0 2rem;height:64px;display:flex;align-items:center;gap:1rem;box-shadow:0 2px 12px rgba(0,0,0,0.18);}
    .topbar-logo{display:flex;align-items:center;gap:0.75rem;text-decoration:none;}.topbar-logo img{height:52px;width:auto;object-fit:contain;}
    .topbar-logo-fallback{width:38px;height:38px;background:rgba(255,255,255,0.15);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.125rem;}
    .topbar-title{font-family:'Adlam Display',serif;font-size:1.375rem;color:var(--white);letter-spacing:1.5px;}
    .login-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:2.5rem 1.25rem;}
    .card{background:var(--white);border-radius:16px;box-shadow:0 8px 40px rgba(21,96,130,0.13);padding:2.75rem 2.5rem;width:100%;max-width:420px;animation:fadeUp 0.4s ease;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .card-header{text-align:center;margin-bottom:2rem;}
    .card-header h1{font-family:'Adlam Display',serif;font-size:1.5rem;color:var(--primary);margin-bottom:0.375rem;}
    .card-header p{font-size:0.875rem;color:var(--muted);}
    .divider{width:48px;height:3px;background:var(--primary);border-radius:2px;margin:0.75rem auto 0;}
    .field{margin-bottom:1.25rem;}
    label{display:block;font-size:0.8125rem;font-weight:600;color:var(--text);margin-bottom:0.375rem;}
    input[type="text"],input[type="password"]{width:100%;padding:0.6875rem 0.875rem;border:1.5px solid #d0dce8;border-radius:8px;font-family:'Nunito',sans-serif;font-size:0.875rem;color:var(--text);outline:none;transition:border-color 0.2s;}
    input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(21,96,130,0.1);}
    .btn{width:100%;padding:0.75rem;background:var(--primary);color:var(--white);border:none;border-radius:8px;font-family:'Nunito',sans-serif;font-size:0.9375rem;font-weight:600;cursor:pointer;transition:background 0.2s;margin-top:0.5rem;}
    .btn:hover{background:var(--primary-dark);}
    .msg{font-size:0.8125rem;color:var(--err);margin-top:0.75rem;min-height:18px;text-align:center;}
    .success-box{display:none;margin-top:1rem;padding:0.75rem;background:#eaf7ef;border-radius:8px;text-align:center;color:#1a7a45;font-weight:600;font-size:0.875rem;}
  </style>
</head>
<body>
  <div class="topbar">
    <a class="topbar-logo" href="Dashboard.html"><img src="images/lanc_logo.png" alt="UCLan logo"/><span class="topbar-title">HEALTH MATTERS</span> </a>
  </div>
  <div class="login-wrapper">
    <div class="card">
      <div class="card-header">
        <h1>Administrator Login</h1>
        <p>Sign in with your administrative credentials</p>
        <div class="divider"></div>
      </div>
      <form id="loginForm" autocomplete="off">
        <div class="field"><label for="username">Username</label><input id="username" type="text" required autocomplete="username" autofocus placeholder="Enter username"/></div>
        <div class="field"><label for="password">Password</label><input id="password" type="password" required autocomplete="current-password" placeholder="Enter password"/></div>
        <button class="btn" type="submit">Sign In</button>
        <div id="msg" class="msg"></div>
      </form>
      <div id="adminArea" class="success-box">Login successful! Redirecting…</div>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit',function(e){
      e.preventDefault();
      const username=document.getElementById('username').value.trim();
      const password=document.getElementById('password').value;
      const msg=document.getElementById('msg');
      if(username==='admin'&&password==='password'){
        document.getElementById('adminArea').style.display='block';
        msg.textContent='';
        setTimeout(()=>{window.location.href='Dashboard.html';},1500);
      }else{
        msg.textContent='Invalid username or password. Please try again.';
        document.getElementById('password').value='';
      }
    });
  </script>
</body>
</html>
